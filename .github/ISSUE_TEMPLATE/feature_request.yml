name: 機能提案
description: ChapterFlowへの改善案や新機能を提案します
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        提案ありがとうございます。実現方法よりも、まず困っていることや目的を教えてください。
  - type: textarea
    id: problem
    attributes:
      label: 解決したいこと
      description: どのような場面で何に困っていますか。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 希望する動作
      description: どのように動くと使いやすいかを説明してください。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案・補足
      description: 現在の回避方法や参考例があれば記載してください。
  - type: checkboxes
    id: safety
    attributes:
      label: 送信前の確認
      options:
        - label: APIキー、個人情報、公開したくない作品本文を含めていません
          required: true
